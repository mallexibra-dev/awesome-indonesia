name: Update README

on:
  push:
    branches: [ main ]
    paths:
      - "repos.json"
      - "scripts/update-readme.py"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh README metadata
        run: python scripts/update-readme.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create README update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update repository metadata"
          title: "chore: update repository metadata"
          body: |
            Automated README refresh generated from `repos.json` and GitHub API metadata.
          branch: "chore/update-readme"
          delete-branch: true
          add-paths: "README.md"
