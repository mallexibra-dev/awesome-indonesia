name: Markdown Lint

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.json"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install markdownlint
        run: npm install --no-fund --no-audit markdownlint-cli
      - name: Run markdownlint
        run: npx markdownlint --config .markdownlint.json README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md
